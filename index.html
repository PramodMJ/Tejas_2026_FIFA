<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FIFA World Cup Prediction Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 600px; margin: 0 auto; }
    h1 { margin: 0 0 16px; font-size: 22px; }
    .match {
      border: 1px solid #ccc;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #fff;
    }
    .match.over {
      background: #f5f5f5;
      opacity: 0.85;
      border: 1px solid #999;
    }
    .match.live {
      border: 1px solid #28a745;
      background: #e8f5e9;
    }
    .match-cutoff {
      background: #fff3cd;
      border: 1px solid #ffc107;
    }
    .match-predicted {
      background: #d4edda;
      border: 1px solid #28a745;
    }
    .match-header {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .match-info {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .match-status {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .status-live {
      color: #28a745;
      font-weight: bold;
    }
    .status-over {
      color: #dc3545;
      font-weight: bold;
    }
    .existing-prediction {
      font-size: 12px;
      color: #28a745;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .goal-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .goal-inputs label {
      font-size: 13px;
      color: #555;
    }
    input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 60px;
      text-align: center;
    }
    input::placeholder {
      text-align: center;
    }
    input.has-prediction {
      background: #c3e6cb;
      border-color: #28a745;
    }
    input.over {
      background: #e0e0e0;
    }
    .doubling-section {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .doubling-section label {
      font-size: 13px;
      color: #555;
    }
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      min-width: 120px;
    }
    select.has-prediction {
      background: #c3e6cb;
      border-color: #28a745;
    }
    select.over {
      background: #e0e0e0;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error { color: #dc3545; margin-top: 8px; font-size: 13px; }
    .success { color: #28a745; margin-top: 8px; font-size: 13px; }
    .cutoff-note {
      background: #fff3cd;
      padding: 10px;
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13px;
      color: #856404;
    }
    .player-section {
      margin-bottom: 16px;
    }
    .player-section select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      min-width: 250px;
    }
    #loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }
    .prediction-label {
      font-size: 12px;
      color: #777;
      margin-bottom: 4px;
    }
    .no-players {
      color: #dc3545;
      font-size: 13px;
      margin-top: 8px;
    }
    .loading-predictions {
      text-align: center;
      color: #007bff;
      padding: 12px;
      font-size: 14px;
    }
    .score-display {
      background: #e3f2fd;
      padding: 8px;
      border-radius: 6px;
      margin: 8px 0;
      font-size: 13px;
      color: #1976d2;
    }
    .winner-section {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>FIFA World Cup Prediction Game</h1>

  <div id="cutoffNotice" class="cutoff-note" style="display:none;">
    ⚠️ Prediction submission is currently **closed** (10 PM - 12 AM IST).<br>
    It will reopen at 12 AM midnight.
  </div>

  <div class="player-section" id="playerSection">
    <label for="playerName" style="font-size: 14px; margin-bottom: 8px; display: block;">Select your name:</label>
    <select id="playerName">
      <option value="">-- Select your name --</option>
    </select>
    <div id="playerError" class="error" style="display: none;"></div>
    <button id="setPlayerBtn" style="margin-top: 12px;">Start</button>
  </div>

  <div id="userInfoSection" style="display: none; margin-bottom: 16px;">
    <div style="background: #e7f3ff; padding: 12px; border-radius: 6px;">
      <strong>👤 Your name:</strong> <span id="displayPlayerName"></span>
      <button id="backBtn" style="width: auto; padding: 6px 12px; margin-left: 12px; background: #6c757d;">Back</button>
    </div>
  </div>

  <div id="loading">Loading players and matches...</div>
  <div id="matchesSection"></div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWFbVKomVRA63kND1WLdwS2OnHV0d86XvULJkZWYFppl3jWZscPET9VBFva1hxvu2o/exec";

    let playerName = "";
    let matchesData = [];
    let playersData = [];
    let userPredictions = {};
    let matchScores = {};

    function isCutoffTime() {
      const now = new Date();
      const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
      const istOffset = 5.5 * 60 * 60000;
      const istTime = new Date(utc + istOffset);
      const hour = istTime.getHours();
      return hour >= 23 || hour < 0;
    }

    function getMatchStatus(match) {
      if (match.MatchStatus && match.MatchStatus.toLowerCase() === "over") {
        return "Over";
      }
      return "Live";
    }

    async function fetchPlayers() {
      try {
        const url = `${APPS_SCRIPT_URL}?path=Players&action=read`;
        const response = await fetch(url);
        playersData = await response.json();
        
        const select = document.getElementById("playerName");
        
        if (!select) {
          console.error("ERROR: player select element not found!");
          return;
        }
        
        select.innerHTML = '<option value="">-- Select your name --</option>';
        
        if (playersData.length === 0) {
          const errorDiv = document.createElement("div");
          errorDiv.className = "no-players";
          errorDiv.textContent = "⚠️ No players found.";
          const playerSection = document.getElementById("playerSection");
          if (playerSection) {
            playerSection.appendChild(errorDiv);
          }
        } else {
          playersData.forEach(player => {
            const option = document.createElement("option");
            const playerNameValue = player.player_name || player.PlayerName || player.Playername || "";
            option.value = playerNameValue;
            option.textContent = playerNameValue;
            select.appendChild(option);
          });
        }
      } catch (error) {
        console.error("Error fetching players:", error);
      }
    }

    async function fetchMatches() {
      try {
        const url = `${APPS_SCRIPT_URL}?path=Matches&action=read`;
        const response = await fetch(url);
        matchesData = await response.json();
      } catch (error) {
        console.error("Error fetching matches:", error);
      }
    }

    async function fetchUserPredictions() {
      userPredictions = {};
      matchScores = {};
      
      try {
        const url = `${APPS_SCRIPT_URL}?path=Predictions&action=read`;
        const response = await fetch(url);
        const allPredictions = await response.json();
        
        const userPreds = allPredictions.filter(pred => pred.player_name === playerName);
        
        userPreds.forEach(pred => {
          const match = matchesData.find(m => m.MatchID === pred.match_id);
          
          if (match) {
            const existing = userPredictions[pred.match_id];
            const timestamp = pred.timestamp || "";
            
            if (!existing || timestamp > existing.timestamp) {
              userPredictions[pred.match_id] = {
                homePred: pred.home_pred,
                awayPred: pred.away_pred,
                doubling: pred.doubling,
                resultsPred: pred.results_pred || '',
                resultsStage: pred.results_stage || '',
                timestamp: timestamp,
                id: pred.ID
              };
            }
          }
        });
        
        const scoresUrl = `${APPS_SCRIPT_URL}?path=MatchScore&action=getAllScores&playerName=${playerName}`;
        const scoresResponse = await fetch(scoresUrl);
        const allScores = await scoresResponse.json();
        matchScores = allScores;
        
      } catch (error) {
        console.error("Error fetching predictions:", error);
      }
    }

    async function initializeApp() {
      await fetchPlayers();
      await fetchMatches();
      document.getElementById("loading").style.display = "none";
    }

    function updateWinnerBasedOnScore(homeInput, awayInput, winnerSelect, homeTeam, awayTeam) {
      const home = parseInt(homeInput.value) || 0;
      const away = parseInt(awayInput.value) || 0;
      
      if (home > away) {
        winnerSelect.value = homeTeam;
        winnerSelect.disabled = true;
        winnerSelect.classList.add("over");
      } else if (away > home) {
        winnerSelect.value = awayTeam;
        winnerSelect.disabled = true;
        winnerSelect.classList.add("over");
      } else {
        winnerSelect.disabled = false;
        winnerSelect.classList.remove("over");
      }
    }

    async function savePrediction(matchId, homePred, awayPred, doubling, winner, homeTeam, awayTeam) {
      const timestamp = new Date().toISOString();
      
      try {
        const existingPred = userPredictions[matchId];
        
        if (matchId <= 72) {
          const home = parseInt(homePred) || 0;
          const away = parseInt(awayPred) || 0;
          
          if (home > away) {
            winner = homeTeam;
          } else if (away > home) {
            winner = awayTeam;
          } else {
            winner = "Draw";
          }
        }
        
        let resultsStage;
        if (matchId < 73) {
          resultsStage = "NA";
        } else {
          const home = parseInt(homePred) || 0;
          const away = parseInt(awayPred) || 0;
          resultsStage = (home === away) ? "Penalty" : "Full Time";
        }
        
        // NEW: Use UPDATE instead of DELETE + WRITE (1 API call)
        if (existingPred) {
          console.log("Updating existing prediction for MatchID:", matchId);
          
          const updateUrl = `${APPS_SCRIPT_URL}?path=Predictions&action=update`;
          
          const body = `timestamp=${timestamp}&player_name=${playerName}&match_id=${matchId}&home_pred=${homePred}&away_pred=${awayPred}&doubling=${doubling}&results_pred=${winner}&results_stage=${resultsStage}`;
          
          const updateResponse = await fetch(updateUrl, {
            method: 'POST',
            body: body
          });
          
          const updateResult = await updateResponse.json();
          
          if (updateResult.success) {
            console.log("✓ Row updated successfully");
            
            userPredictions[matchId] = {
              homePred: homePred,
              awayPred: awayPred,
              doubling: doubling,
              resultsPred: winner,
              resultsStage: resultsStage,
              timestamp: timestamp,
              id: existingPred.id
            };
            
            return true;
          } else {
            console.error("✗ Failed to update row:", updateResult.error);
            
            // Show detailed error message
            if (updateResult.searchingFor) {
              console.error("Searching for:", updateResult.searchingFor);
              console.error("Found rows for player:", updateResult.foundRowsForPlayer);
              
              let errorMsg = "❌ Error: Row not found";
              errorMsg += "Searching for: " + updateResult.searchingFor.player_name + " | Match " + updateResult.searchingFor.match_id + " ";
              
              if (updateResult.foundRowsForPlayer.length > 0) {
                errorMsg += "Found " + updateResult.foundRowsForPlayer.length + " rows for this player: ";
                errorMsg += updateResult.foundRowsForPlayer.map(r => "  Row " + r.row + ": Match " + r.match_id + " (" + r.home_pred + "-" + r.away_pred + ")").join(" ");
              } else {
                errorMsg += "No rows found for this player.";
              }
              
              alert(errorMsg);
            }
            
            return false;
          }
        } else {
          console.log("Creating new prediction for MatchID:", matchId);
          
          const writeUrl = `${APPS_SCRIPT_URL}?path=Predictions&action=write`;
          
          const body = `timestamp=${timestamp}&player_name=${playerName}&match_id=${matchId}&home_pred=${homePred}&away_pred=${awayPred}&doubling=${doubling}&results_pred=${winner}&results_stage=${resultsStage}`;
          
          const writeResponse = await fetch(writeUrl, {
            method: 'POST',
            body: body
          });
          
          const writeResult = await writeResponse.json();
          
          if (writeResult.success) {
            console.log("✓ New row written successfully");
            
            userPredictions[matchId] = {
              homePred: homePred,
              awayPred: awayPred,
              doubling: doubling,
              resultsPred: winner,
              resultsStage: resultsStage,
              timestamp: timestamp,
              id: writeResult.id
            };
            
            return true;
          } else {
            console.error("✗ Failed to write new row:", writeResult.error);
            return false;
          }
        }
      } catch (error) {
        console.error("Error in savePrediction:", error);
        return false;
      }
    }

    function renderMatches() {
      const container = document.getElementById("matchesSection");
      container.innerHTML = "";

      if (!playerName) {
        container.innerHTML = "<p>Please select your name first.</p>";
        return;
      }

      document.getElementById("userInfoSection").style.display = "block";
      document.getElementById("displayPlayerName").textContent = playerName;

      const isCutoff = isCutoffTime();
      if (isCutoff) {
        document.getElementById("cutoffNotice").style.display = "block";
      } else {
        document.getElementById("cutoffNotice").style.display = "none";
      }

      matchesData.forEach(m => {
        const matchStatus = getMatchStatus(m);
        const existingPred = userPredictions[m.MatchID];
        const matchScore = matchScores[m.MatchID] || 0;
        const needsWinner = m.MatchID >= 73;
        
        const div = document.createElement("div");
        
        let extraClass = "";
        if (matchStatus === "Over") {
          extraClass = "over";
        } else if (existingPred) {
          extraClass = "match-predicted";
        } else if (isCutoff) {
          extraClass = "match-cutoff";
        }
        
        div.className = "match " + extraClass;

        const header = document.createElement("div");
        header.className = "match-header";
        header.textContent = `${m.MatchID} | ${m.HomeTeam} vs ${m.AwayTeam}`;

        const info = document.createElement("div");
        info.className = "match-info";
        info.textContent = m.Date;

        const scoreDiv = document.createElement("div");
        scoreDiv.className = "score-display";
        scoreDiv.textContent = `⭐ Your Score: ${matchScore.toFixed(2)} points`;
        div.appendChild(scoreDiv);

        const statusDiv = document.createElement("div");
        statusDiv.className = "match-status";
        
        if (matchStatus === "Over") {
          statusDiv.innerHTML = `<span class="status-over">⏹ Match Over</span> | Result: ${m.HomeGoalsReal || "-"} - ${m.AwayGoalsReal || "-"}`;
        } else if (existingPred) {
          statusDiv.innerHTML = `<span class="status-live">✓ Live</span> | You have a prediction`;
        } else {
          statusDiv.innerHTML = `<span class="status-live">✓ Live</span> | Open for predictions`;
        }

        if (existingPred) {
          const existingMsg = document.createElement("div");
          existingMsg.className = "existing-prediction";
          let winnerText = existingPred.resultsPred ? ` | Winner: ${existingPred.resultsPred}` : '';
          let stageText = existingPred.resultsStage ? ` | Stage: ${existingPred.resultsStage}` : '';
          existingMsg.textContent = `📋 Your prediction: ${m.HomeTeam} ${existingPred.homePred} - ${existingPred.awayPred} ${m.AwayTeam} | Doubling: ${existingPred.doubling}${winnerText}${stageText}`;
          div.appendChild(existingMsg);
        }

        const goalsDiv = document.createElement("div");
        const goalsLabel = document.createElement("div");
        goalsLabel.className = "prediction-label";
        goalsLabel.textContent = "1) Predict Goals:";
        
        const goalInputs = document.createElement("div");
        goalInputs.className = "goal-inputs";
        
        const homeLabel = document.createElement("label");
        homeLabel.textContent = `${m.HomeTeam}:`;
        
        const homeInput = document.createElement("input");
        homeInput.type = "number";
        homeInput.placeholder = "?";
        homeInput.id = `home-${m.MatchID}`;
        homeInput.min = 0;
        
        if (existingPred) {
          homeInput.value = existingPred.homePred;
          homeInput.classList.add("has-prediction");
        }

        const awayLabel = document.createElement("label");
        awayLabel.textContent = `${m.AwayTeam}:`;
        
        const awayInput = document.createElement("input");
        awayInput.type = "number";
        awayInput.placeholder = "?";
        awayInput.id = `away-${m.MatchID}`;
        awayInput.min = 0;
        
        if (existingPred) {
          awayInput.value = existingPred.awayPred;
          awayInput.classList.add("has-prediction");
        }

        goalInputs.appendChild(homeLabel);
        goalInputs.appendChild(homeInput);
        goalInputs.appendChild(awayLabel);
        goalInputs.appendChild(awayInput);

        goalsDiv.appendChild(goalsLabel);
        goalsDiv.appendChild(goalInputs);

        if (needsWinner) {
          const winnerDiv = document.createElement("div");
          const winnerLabel = document.createElement("div");
          winnerLabel.className = "prediction-label";
          winnerLabel.textContent = "2) Winner:";
          
          const winnerSection = document.createElement("div");
          winnerSection.className = "winner-section";
          
          const winnerSelect = document.createElement("select");
          winnerSelect.id = `winner-${m.MatchID}`;
          
          const optionHome = document.createElement("option");
          optionHome.value = m.HomeTeam;
          optionHome.textContent = m.HomeTeam;
          
          const optionAway = document.createElement("option");
          optionAway.value = m.AwayTeam;
          optionAway.textContent = m.AwayTeam;
          
          winnerSelect.appendChild(optionHome);
          winnerSelect.appendChild(optionAway);
          
          if (existingPred && existingPred.resultsPred) {
            winnerSelect.value = existingPred.resultsPred;
            winnerSelect.classList.add("has-prediction");
          }
          
          homeInput.addEventListener('input', () => {
            updateWinnerBasedOnScore(homeInput, awayInput, winnerSelect, m.HomeTeam, m.AwayTeam);
          });
          
          awayInput.addEventListener('input', () => {
            updateWinnerBasedOnScore(homeInput, awayInput, winnerSelect, m.HomeTeam, m.AwayTeam);
          });
          
          if (existingPred) {
            updateWinnerBasedOnScore(homeInput, awayInput, winnerSelect, m.HomeTeam, m.AwayTeam);
          }
          
          winnerSection.appendChild(winnerSelect);

          winnerDiv.appendChild(winnerLabel);
          winnerDiv.appendChild(winnerSection);

          goalsDiv.appendChild(winnerDiv);
        }

        const doublingDiv = document.createElement("div");
        const doublingLabel = document.createElement("div");
        doublingLabel.className = "prediction-label";
        doublingLabel.textContent = needsWinner ? "3) Doubling:" : "2) Doubling:";
        
        const doublingSection = document.createElement("div");
        doublingSection.className = "doubling-section";
        
        const doublingSelect = document.createElement("select");
        doublingSelect.id = `doubling-${m.MatchID}`;
        
        const optionNo = document.createElement("option");
        optionNo.value = "No";
        optionNo.textContent = "No";
        
        const optionYes = document.createElement("option");
        optionYes.value = "Yes";
        optionYes.textContent = "Yes";
        
        doublingSelect.appendChild(optionNo);
        doublingSelect.appendChild(optionYes);
        
        if (existingPred && existingPred.doubling) {
          doublingSelect.value = existingPred.doubling;
          doublingSelect.classList.add("has-prediction");
        }

        doublingSection.appendChild(doublingSelect);

        doublingDiv.appendChild(doublingLabel);
        doublingDiv.appendChild(doublingSection);

        const submitBtn = document.createElement("button");
        submitBtn.id = `btn-${m.MatchID}`;

        if (matchStatus === "Over") {
          submitBtn.textContent = "Match Over";
          submitBtn.disabled = true;
          homeInput.disabled = true;
          awayInput.disabled = true;
          if (needsWinner) {
            const winnerSelect = document.getElementById(`winner-${m.MatchID}`);
            if (winnerSelect) {
              winnerSelect.disabled = true;
              winnerSelect.classList.add("over");
            }
          }
          doublingSelect.disabled = true;
          homeInput.classList.add("over");
          awayInput.classList.add("over");
          doublingSelect.classList.add("over");
        } else if (isCutoff) {
          submitBtn.textContent = "Closed";
          submitBtn.disabled = true;
          homeInput.disabled = true;
          awayInput.disabled = true;
          if (needsWinner) {
            const winnerSelect = document.getElementById(`winner-${m.MatchID}`);
            if (winnerSelect) {
              winnerSelect.disabled = true;
              winnerSelect.classList.add("over");
            }
          }
          doublingSelect.disabled = true;
        } else {
          submitBtn.textContent = existingPred ? "Update Prediction" : "Submit Prediction";
        }

        submitBtn.onclick = async () => {
          const homePred = homeInput.value;
          const awayPred = awayInput.value;
          const doubling = doublingSelect.value;
          
          let winner = "";
          if (needsWinner) {
            const winnerSelect = document.getElementById(`winner-${m.MatchID}`);
            if (winnerSelect) {
              winner = winnerSelect.value;
            }
          }

          if (matchStatus === "Over") {
            alert("⚠️ This match is Over.");
            return;
          }

          if (!homePred || !awayPred) {
            alert("Please enter both home and away goals.");
            return;
          }

          if (needsWinner) {
            const home = parseInt(homePred) || 0;
            const away = parseInt(awayPred) || 0;
            
            if (home !== away && !winner) {
              alert("Please select a winner.");
              return;
            }
          }

          submitBtn.textContent = "Saving...";
          submitBtn.disabled = true;

          const success = await savePrediction(
            m.MatchID, 
            homePred, 
            awayPred, 
            doubling, 
            winner,
            m.HomeTeam,
            m.AwayTeam
          );

          if (success) {
            const msg = document.createElement("div");
            msg.className = "success";
            let winnerText = winner ? ` | Winner: ${winner}` : '';
            let stageText = userPredictions[m.MatchID].resultsStage ? ` | Stage: ${userPredictions[m.MatchID].resultsStage}` : '';
            msg.textContent = `✓ Prediction ${existingPred ? 'updated' : 'saved'}: ${m.HomeTeam} ${homePred} - ${awayPred} ${m.AwayTeam} | Doubling: ${doubling}${winnerText}${stageText}`;
            div.appendChild(msg);

            homeInput.disabled = true;
            awayInput.disabled = true;
            if (needsWinner) {
              const winnerSelect = document.getElementById(`winner-${m.MatchID}`);
              if (winnerSelect) {
                winnerSelect.disabled = true;
                winnerSelect.classList.add("over");
              }
            }
            doublingSelect.disabled = true;
            submitBtn.textContent = "Saved";
            
            div.classList.remove("match-cutoff");
            div.classList.add("match-predicted");
          } else {
            const msg = document.createElement("div");
            msg.className = "error";
            msg.textContent = "❌ Error saving prediction. Please try again.";
            div.appendChild(msg);
            submitBtn.disabled = false;
            submitBtn.textContent = existingPred ? "Update Prediction" : "Submit Prediction";
          }
        };

        div.appendChild(header);
        div.appendChild(info);
        div.appendChild(statusDiv);
        div.appendChild(goalsDiv);
        div.appendChild(doublingDiv);
        div.appendChild(submitBtn);

        container.appendChild(div);
      });
    }

    document.getElementById("setPlayerBtn").onclick = async () => {
      const select = document.getElementById("playerName");
      const name = select.value.trim();
      
      if (!name) {
        const errorDiv = document.getElementById("playerError");
        errorDiv.textContent = "Please select your name.";
        errorDiv.style.display = "block";
        return;
      }
      
      playerName = name;
      document.getElementById("playerSection").style.display = "none";
      
      const loadingDiv = document.createElement("div");
      loadingDiv.id = "loadingPredictions";
      loadingDiv.className = "loading-predictions";
      loadingDiv.textContent = "Loading your existing predictions and scores...";
      document.getElementById("matchesSection").appendChild(loadingDiv);
      
      await fetchUserPredictions();
      
      loadingDiv.remove();
      
      renderMatches();
    };

    document.getElementById("backBtn").onclick = () => {
      playerName = "";
      userPredictions = {};
      matchScores = {};
      document.getElementById("userInfoSection").style.display = "none";
      document.getElementById("playerSection").style.display = "block";
      document.getElementById("matchesSection").innerHTML = "";
      document.getElementById("playerError").style.display = "none";
    };

    initializeApp();
  </script>
</body>
</html>
