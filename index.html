<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FIFA World Cup Prediction Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: Arial, sans-serif; padding: 16px; max-width: 600px; margin: 0 auto; }
    h1 { margin: 0 0 16px; font-size: 22px; }
    .match {
      border: 1px solid #ccc;
      margin: 10px 0;
      padding: 12px;
      border-radius: 8px;
      background: #fff;
    }
    .match.played {
      background: #f5f5f5;
      opacity: 0.85;
    }
    .match-cutoff {
      background: #fff3cd;
      border: 1px solid #ffc107;
    }
    .match-header {
      font-weight: bold;
      margin-bottom: 6px;
      font-size: 15px;
    }
    .match-info {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .match-status {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 8px;
    }
    .goal-inputs {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .goal-inputs label {
      font-size: 13px;
      color: #555;
    }
    input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 60px;
      text-align: center;
    }
    input::placeholder {
      text-align: center;
    }
    .doubling-section {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .doubling-section label {
      font-size: 13px;
      color: #555;
    }
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      min-width: 120px;
    }
    button {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error { color: #dc3545; margin-top: 8px; font-size: 13px; }
    .success { color: #28a745; margin-top: 8px; font-size: 13px; }
    .cutoff-note {
      background: #fff3cd;
      padding: 10px;
      border-radius: 6px;
      margin: 12px 0;
      font-size: 13px;
      color: #856404;
    }
    .player-section {
      margin-bottom: 16px;
    }
    .player-section select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
      min-width: 250px;
    }
    #loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }
    .prediction-label {
      font-size: 12px;
      color: #777;
      margin-bottom: 4px;
    }
    .no-players {
      color: #dc3545;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>FIFA World Cup Prediction Game</h1>

  <!-- Cutoff notice -->
  <div id="cutoffNotice" class="cutoff-note" style="display:none;">
    ⚠️ Prediction submission is currently **closed** (8 PM - 12 AM IST).<br>
    It will reopen at 12 AM midnight.
  </div>

  <!-- Player section -->
  <div class="player-section" id="playerSection">
    <label for="playerName" style="font-size: 14px; margin-bottom: 8px; display: block;">Select your name:</label>
    <select id="playerName">
      <option value="">-- Select your name --</option>
    </select>
    <div id="playerError" class="error" style="display: none;"></div>
    <button id="setPlayerBtn" style="margin-top: 12px;">Start</button>
  </div>

  <!-- Matches section -->
  <div id="loading">Loading players and matches...</div>
  <div id="matchesSection"></div>

  <script>
    // CONFIG: Replace with your SheetDB API key
    const SHEETDB_API_KEY = "pw45s0ate4eoy";
    const SHEETDB_MATCHES_URL = `https://sheetdb.io/api/v1/${SHEETDB_API_KEY}?sheet=Matches`;
    const SHEETDB_PREDICTIONS_URL = `https://sheetdb.io/api/v1/${SHEETDB_API_KEY}?sheet=Predictions`;
    const SHEETDB_PLAYERS_URL = `https://sheetdb.io/api/v1/${SHEETDB_API_KEY}?sheet=Players`;

    let playerName = "";
    let matchesData = [];
    let playersData = [];

    // Check if current time is between 8PM and 12AM IST
    function isCutoffTime() {
      const now = new Date();
      // Convert to IST (UTC+5:30)
      const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
      const istOffset = 5.5 * 60 * 60000;
      const istTime = new Date(utc + istOffset);
      
      const hour = istTime.getHours();
      // Cutoff: 8 PM (20) to 12 AM (0)
      return hour >= 20 || hour < 0;
    }

    function getMatchStatus(match) {
      if (match.HomeGoalsReal && match.AwayGoalsReal) {
        return "Played";
      }
      return "Not started";
    }

    // Fetch players from Google Sheet
    async function fetchPlayers() {
      try {
        const response = await fetch(SHEETDB_PLAYERS_URL);
        playersData = await response.json();
        
        const select = document.getElementById("playerName");
        select.innerHTML = '<option value="">-- Select your name --</option>';
        
        if (playersData.length === 0) {
          const errorDiv = document.createElement("div");
          errorDiv.className = "no-players";
          errorDiv.textContent = "⚠️ No players found. Please add player names to the 'Players' sheet in your Google Sheet.";
          document.getElementById("playerSection").appendChild(errorDiv);
          document.getElementById("setPlayerBtn").disabled = true;
        } else {
          playersData.forEach(player => {
            const option = document.createElement("option");
            option.value = player.PlayerName;
            option.textContent = player.PlayerName;
            select.appendChild(option);
          });
        }
      } catch (error) {
        const errorDiv = document.createElement("div");
        errorDiv.className = "no-players";
        errorDiv.textContent = "⚠️ Error loading players. Please check your API key.";
        document.getElementById("playerSection").appendChild(errorDiv);
        console.error(error);
      }
    }

    // Fetch matches from Google Sheet
    async function fetchMatches() {
      try {
        const response = await fetch(SHEETDB_MATCHES_URL);
        matchesData = await response.json();
      } catch (error) {
        document.getElementById("loading").textContent = "Error loading matches. Please check your API key.";
        console.error(error);
      }
    }

    // Initialize app
    async function initializeApp() {
      await fetchPlayers();
      await fetchMatches();
      document.getElementById("loading").style.display = "none";
    }

    // Save prediction to Google Sheet
    async function savePrediction(matchId, homePred, awayPred, doubling) {
      const payload = {
        Timestamp: new Date().toISOString(),
        PlayerName: playerName,
        MatchID: matchId,
        HomePred: homePred,
        AwayPred: awayPred,
        Doubling: doubling
      };

      try {
        const response = await fetch(SHEETDB_PREDICTIONS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          return true;
        } else {
          return false;
        }
      } catch (error) {
        console.error(error);
        return false;
      }
    }

    function renderMatches() {
      const container = document.getElementById("matchesSection");
      container.innerHTML = "";

      if (!playerName) {
        container.innerHTML = "<p>Please select your name first.</p>";
        return;
      }

      const isCutoff = isCutoffTime();
      if (isCutoff) {
        document.getElementById("cutoffNotice").style.display = "block";
      } else {
        document.getElementById("cutoffNotice").style.display = "none";
      }

      matchesData.forEach(m => {
        const status = getMatchStatus(m);
        const div = document.createElement("div");
        
        let extraClass = "";
        if (status === "Played") {
          extraClass = "played";
        } else if (isCutoff) {
          extraClass = "match-cutoff";
        }
        
        div.className = "match " + extraClass;

        const header = document.createElement("div");
        header.className = "match-header";
        header.textContent = `${m.MatchID} | ${m.HomeTeam} vs ${m.AwayTeam}`;

        const info = document.createElement("div");
        info.className = "match-info";
        info.textContent = m.Date;

        const statusDiv = document.createElement("div");
        statusDiv.className = "match-status";
        if (status === "Played") {
          statusDiv.textContent = `✓ Played | Result: ${m.HomeGoalsReal} - ${m.AwayGoalsReal}`;
        } else if (isCutoff) {
          statusDiv.textContent = `⏸ Cutoff period (8 PM - 12 AM) | Submissions closed`;
        } else {
          statusDiv.textContent = `⏱ Not started`;
        }

        // Home/Away Goals section
        const goalsDiv = document.createElement("div");
        const goalsLabel = document.createElement("div");
        goalsLabel.className = "prediction-label";
        goalsLabel.textContent = "1) Predict Goals:";
        
        const goalInputs = document.createElement("div");
        goalInputs.className = "goal-inputs";
        
        const homeLabel = document.createElement("label");
        homeLabel.textContent = `${m.HomeTeam}:`;
        
        const homeInput = document.createElement("input");
        homeInput.type = "number";
        homeInput.placeholder = "?";
        homeInput.id = `home-${m.MatchID}`;
        homeInput.min = 0;

        const awayLabel = document.createElement("label");
        awayLabel.textContent = `${m.AwayTeam}:`;
        
        const awayInput = document.createElement("input");
        awayInput.type = "number";
        awayInput.placeholder = "?";
        awayInput.id = `away-${m.MatchID}`;
        awayInput.min = 0;

        goalInputs.appendChild(homeLabel);
        goalInputs.appendChild(homeInput);
        goalInputs.appendChild(awayLabel);
        goalInputs.appendChild(awayInput);

        goalsDiv.appendChild(goalsLabel);
        goalsDiv.appendChild(goalInputs);

        // Doubling section
        const doublingDiv = document.createElement("div");
        const doublingLabel = document.createElement("div");
        doublingLabel.className = "prediction-label";
        doublingLabel.textContent = "2) Doubling:";
        
        const doublingSection = document.createElement("div");
        doublingSection.className = "doubling-section";
        
        const doublingSelect = document.createElement("select");
        doublingSelect.id = `doubling-${m.MatchID}`;
        
        const optionNo = document.createElement("option");
        optionNo.value = "No";
        optionNo.textContent = "No";
        
        const optionYes = document.createElement("option");
        optionYes.value = "Yes";
        optionYes.textContent = "Yes";
        
        doublingSelect.appendChild(optionNo);
        doublingSelect.appendChild(optionYes);

        doublingSection.appendChild(doublingSelect);

        doublingDiv.appendChild(doublingLabel);
        doublingDiv.appendChild(doublingSection);

        // Submit button
        const submitBtn = document.createElement("button");
        submitBtn.textContent = "Submit Prediction";
        submitBtn.id = `btn-${m.MatchID}`;

        // Disable if: Played OR cutoff time
        if (status === "Played" || isCutoff) {
          homeInput.disabled = true;
          awayInput.disabled = true;
          doublingSelect.disabled = true;
          submitBtn.disabled = true;
          submitBtn.textContent = status === "Played" ? "Locked" : "Closed";
        }

        submitBtn.onclick = async () => {
          const homePred = homeInput.value;
          const awayPred = awayInput.value;
          const doubling = doublingSelect.value;

          if (!homePred || !awayPred) {
            alert("Please enter both home and away goals.");
            return;
          }

          submitBtn.textContent = "Saving...";
          submitBtn.disabled = true;

          const success = await savePrediction(m.MatchID, homePred, awayPred, doubling);

          if (success) {
            const msg = document.createElement("div");
            msg.className = "success";
            msg.textContent = `✓ Prediction saved: ${m.HomeTeam} ${homePred} - ${awayPred} ${m.AwayTeam} | Doubling: ${doubling}`;
            div.appendChild(msg);

            homeInput.disabled = true;
            awayInput.disabled = true;
            doublingSelect.disabled = true;
            submitBtn.textContent = "Saved";
          } else {
            const msg = document.createElement("div");
            msg.className = "error";
            msg.textContent = "❌ Error saving prediction. Please try again.";
            div.appendChild(msg);
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Prediction";
          }
        };

        div.appendChild(header);
        div.appendChild(info);
        div.appendChild(statusDiv);
        div.appendChild(goalsDiv);
        div.appendChild(doublingDiv);
        div.appendChild(submitBtn);

        container.appendChild(div);
      });
    }

    document.getElementById("setPlayerBtn").onclick = () => {
      const select = document.getElementById("playerName");
      const name = select.value.trim();
      
      if (!name) {
        const errorDiv = document.getElementById("playerError");
        errorDiv.textContent = "Please select your name.";
        errorDiv.style.display = "block";
        return;
      }
      
      playerName = name;
      document.getElementById("playerSection").style.display = "none";
      renderMatches();
    };

    // Initialize app on load
    initializeApp();
  </script>
</body>
</html>
